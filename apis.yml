aid: escape
name: Escape
url: https://raw.githubusercontent.com/api-evangelist/escape/refs/heads/main/apis.yml
description: >-
  Escape was founded in 2020 after one of our co-founders experienced a cyberattack and saw firsthand how vulnerable
  exposed APIs can be. Driven by a belief in the power of AI to transform cybersecurity, we built a platform that
  emulates hacker behavior to identify vulnerabilities before they can be exploited. Escape is a DAST (Dynamic
  Application Security Testing) platform that helps you document all your APIs, detect complex business logic flaws
  across modern applications like APIs, SPAs, and Microservices, and seamlessly integrate security into your CI/CD
  pipeline.
