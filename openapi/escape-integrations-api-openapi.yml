                    enum:
                    - AKAMAI
                    - AWS
                    - AZURE
                    - BITBUCKET_REPO
                    - CLOUDFLARE
                    - CUSTOM
                    - DISCORD_WEBHOOK
                    - DNS
                    - EMAIL
                    - GCP
                    - GITHUB_API_KEY
                    - GITLAB_API_KEY
                    - JIRA
                    - KUBERNETES
                    - POSTMAN_API_KEY
                    - SLACK_WEBHOOK
                    - TEAMS_WEBHOOK
                    - WEBHOOK
                    - WIZ
                    description: The kind of the integration
                  valid:
                    type: boolean
                    description: Whether the integration is valid
                  validationErrors:
                    type: array
                    items:
                      type: string
                    description: The validation errors of the integration
                  organizationId:
                    type: string
                    format: uuid
                    description: The id of the organization the integration belongs to
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: The id of the project
                        name:
                          type: string
                          description: The name of the project
                        createdAt:
                          type: string
                          format: date-time
                          description: The date and time the project was created
                        bindings:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                                description: The id of the role binding
                              createdAt:
                                type: string
                                format: date-time
                                description: The date and time the role binding was created
                              roleId:
                                type: string
                                format: uuid
                                description: The id of the role bound by the role binding
                              projectId:
                                type:
                                - string
                                - 'null'
                                format: uuid
                                description: The id of the project bound by the role binding
                              userId:
                                type: string
                                format: uuid
                                description: The id of the user bound by the role binding
                            required:
                            - id
                            - createdAt
                            - roleId
                            - userId
                          description: The bindings of the project
                      required:
                      - id
                      - name
                      - createdAt
                      - bindings
                    description: The projects of the integration
                  parameters:
                    type: object
                    properties:
                      client_secret:
                        type: string
                      host:
                        type: string
                      access_token:
                        type: string
                      client_token:
                        type: string
                    required:
                    - client_secret
                    - host
                    - access_token
                    - client_token
                    description: The parameters of the integration
                  location:
                    type:
                    - object
                    - 'null'
                    properties:
                      id:
                        type: string
                        format: uuid
                        default: 00000000-0000-0000-0000-000000000000
                        description: The location ID.
                      name:
                        type: string
                        default: Location Name
                        description: The name of the location.
                      type:
                        type: string
                        default: Location Type
                        description: The type of the location.
                      enabled:
                        type: boolean
                        default: true
                        description: Whether the location is enabled.
                      createdAt:
                        type: string
                        default: '2021-01-01T00:00:00Z'
                        description: The date and time the location was created.
                      lastSeenAt:
                        type:
                        - string
                        - 'null'
                        default: '2021-01-01T00:00:00Z'
                        description: The date and time the location was last seen.
                      links:
                        type: object
                        properties:
                          locationOverview:
                            type: string
                            description: The URL of the location overview.
                        required:
                        - locationOverview
                    required:
                    - links
                    title: LocationDetailed
                    description: The location of the integration
                required:
                - id
                - name
                - createdAt
                - updatedAt
                - scheduledForDeletionAt
                - lastPullWorkflowAt
                - kind
                - valid
                - validationErrors
                - organizationId
                - projects
                - parameters
                - location
