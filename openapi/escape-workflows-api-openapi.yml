openapi: 3.1.0
info:
  version: 3.0.0
  title: Escape Public Asm Workflows API
  description: 'This API enables you to operate [Escape](https://escape.tech/) programmatically.


    All requests must be authenticated with a valid API key, provided in the `X-ESCAPE-API-KEY` header.

    For example: `X-ESCAPE-API-KEY: YOUR_API_KEY`.


    You can find your API key in the [Escape dashboard](https://app.escape.tech/user/).'
servers:
- url: https://public.escape.tech/v3
security:
- apiKey: []
tags:
- name: Workflows
  description: 'Workflows Management


    The public API provides CRUDs operations to manage workflows.'
paths:
  /workflows:
    get:
      tags:
      - Workflows
      summary: List workflows.
      operationId: listWorkflows
      description: List and search workflows of the organization.
      parameters:
      - schema:
          type: string
          description: The cursor to start the pagination from. Returned by the previous page response. If not provided, the first page will be returned.
          example: R1BDOlM6NTEwMzk4NTYtNGIyOS00NTlkLTg0ZDYtMWJhYjM0NWMzZjU5
        required: false
        description: The cursor to start the pagination from. Returned by the previous page response. If not provided, the first page will be returned.
        name: cursor
        in: query
      - schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
          description: The number of items to return per page
          example: 50
        required: false
        description: The number of items to return per page
        name: size
        in: query
      - schema:
          type: string
          enum:
          - CREATED_AT
          - NAME
          description: The type to sort by
        required: false
        description: The type to sort by
        name: sortType
        in: query
      - schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
          description: The direction to sort by
        required: false
        description: The direction to sort by
        name: sortDirection
        in: query
      - schema:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by workflow IDs
        required: false
        description: Filter by workflow IDs
        name: workflowIds
        in: query
      - schema:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by project IDs
        required: false
        description: Filter by project IDs
        name: projectIds
        in: query
      - schema:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by integration IDs
        required: false
        description: Filter by integration IDs
        name: integrationIds
        in: query
      - schema:
          type: array
          items:
            type: string
            enum:
            - ASSET_FOUND
            - ASSET_UPDATED
            - INTEGRATION_FAILED
            - ISSUE_UPDATED
            - LOCATION_DOWN
            - MANUAL
            - NEW_ISSUE
            - SCAN_COMPLETED
            - SCAN_FAILED
            - SCAN_STARTED
          description: Filter by triggers
        required: false
        description: Filter by triggers
        name: triggers
        in: query
      - schema:
          type: string
          description: Search term to filter integrations by name or description
          example: my integration
        required: false
        description: Search term to filter integrations by name or description
        name: search
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  nextCursor:
                    type:
                    - string
                    - 'null'
                  totalCount:
                    type: integer
                    default: 100
                    example: 20
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          default: 00000000-0000-0000-0000-000000000000
                          description: The workflow ID.
                        name:
                          type: string
                          default: Workflow Name
                          description: The name of the workflow.
                        trigger:
                          type: string
                          enum:
                          - ASSET_FOUND
                          - ASSET_UPDATED
                          - INTEGRATION_FAILED
                          - ISSUE_UPDATED
                          - LOCATION_DOWN
                          - MANUAL
                          - NEW_ISSUE
                          - SCAN_COMPLETED
                          - SCAN_FAILED
                          - SCAN_STARTED
                        throttleMs:
                          type:
                          - number
                          - 'null'
                          description: The throttle in milliseconds for the workflow.
                        filters:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                              type:
                                type: string
                                enum:
                                - ASSETS
                                - EVENTS
                                - INTEGRATIONS
                                - ISSUES
                                - LOCATIONS
                                - PROFILES
                                - SCANS
                              filter: {}
                              view:
                                type:
                                - object
                                - 'null'
                                properties:
                                  id:
                                    type: string
                                    format: uuid
                                  name:
                                    type: string
                                  target:
                                    type: string
                                    enum:
                                    - ASSETS
                                    - EVENTS
                                    - INTEGRATIONS
                                    - ISSUES
                                    - LOCATIONS
                                    - PROFILES
                                    - SCANS
                                  data: {}
                                required:
                                - id
                                - name
                                - target
                            required:
                            - id
                            - type
                            - view
                        actions:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                              type:
                                type: string
                                enum:
                                - ACT
                                - EXPORT
                                - NOTIFY
                              parameters: {}
                              internalAction:
                                type:
                                - string
                                - 'null'
                                enum:
                                - UPDATE_ASSET
                                - UPDATE_ISSUE
                                - null
                              integration:
                                type:
                                - object
                                - 'null'
                                properties:
                                  id:
                                    type: string
                                    format: uuid
                                  name:
                                    type: string
                                  kind:
                                    type: string
                                    enum:
                                    - AKAMAI
                                    - AWS
                                    - AZURE
                                    - BITBUCKET_REPO
                                    - CLOUDFLARE
                                    - CUSTOM
                                    - DISCORD_WEBHOOK
                                    - DNS
                                    - EMAIL
                                    - GCP
                                    - GITHUB_API_KEY
                                    - GITLAB_API_KEY
                                    - JIRA
                                    - KUBERNETES
                                    - POSTMAN_API_KEY
                                    - SLACK_WEBHOOK
                                    - TEAMS_WEBHOOK
                                    - WEBHOOK
                                    - WIZ
                                required:
                                - id
                                - name
                                - kind
                            required:
                            - id
                            - type
                            - internalAction
                            - integration
                      required:
                      - trigger
                      - throttleMs
                      - filters
                      - actions
                      title: WorkflowSummarized
                      description: Summarized information about a workflow
                required:
                - nextCursor
                - data
        '400':
          description: Pagination error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    enum:
                    - Invalid cursor
                  details:
                    type: string
                required:
                - message
                - details
                title: PaginationError
                description: Returned when an invalid pagination cursor is supplied
