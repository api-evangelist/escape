                - id
                - status
                - createdAt
                - updatedAt
                - finishedAt
                - score
                - coverage
                - duration
                - progressRatio
                - initiator
                - kind
                - profileId
                - organizationId
                - commitHash
                - commitBranch
                - commitAuthor
                - commitLink
                - commitAuthorProfilePictureLink
                - links
