                    type: string
                    format: uuid
                    description: The id of the scan
                  status:
                    type: string
                    description: The status of the scan
                  createdAt:
                    type: string
                    description: The date and time the scan was created
                  updatedAt:
                    type: string
                    description: The date and time the scan was updated
                  finishedAt:
                    type:
                    - string
