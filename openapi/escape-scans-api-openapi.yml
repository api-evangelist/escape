                              - RATE_LIMIT
                              - REDIRECTION
                              - REPEATER_ERROR
                              - SERVER_ERROR
                              - TIMEOUT
                              - UNAUTHORIZED
                              - UNKNOWN
                              - VALIDATION_ERROR
                              - null
                              description: Coverage status for this REST endpoint (e.g. OK, UNAUTHORIZED, BLOCKLISTED)
                            coverageByUser:
                              type:
                              - array
                              - 'null'
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                    description: User or session label associated with this target entry
                                  coverage:
                                    type: string
                                    enum:
                                    - BROKEN_PIPE
                                    - NOT_FOUND
                                    - OK
                                    - RATE_LIMIT
                                    - REDIRECTION
                                    - REPEATER_ERROR
                                    - SERVER_ERROR
                                    - TIMEOUT
                                    - UNAUTHORIZED
                                    - UNKNOWN
