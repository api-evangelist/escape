                    format: uuid
                  description: The extra asset IDs for the profile
                  example:
                  - 00000000-0000-0000-0000-000000000000
                  - 00000000-0000-0000-0000-000000000001
                useAllAvailableExtraAssets:
                  type: boolean
                  description: Whether to use all available extra assets for the profile
                  example: false
                mode:
                  type: string
                  enum:
                  - read_only
                  - read_write
                  description: Scan aggressiveness. `read_only` runs non-destructive tests and avoids state-changing operations (preferred for production targets). `read_write` runs exhaustive tests including mutations (use on pre-production, staging, or dedicated test environments). If omitted, the API uses `mode` from the configuration JSON when present; otherwise the profile defaults to `read_only`. When both this field and a nested `mode` exist, this top-level value wins.
                  example: read_only
