                  type: string
                  maxLength: 2000
                  description: The description of the profile
                  example: Weekly scan of the production API for compliance
                proxyId:
                  type:
                  - string
                  - 'null'
                  format: uuid
                  description: The proxy ID for the profile
                  example: 00000000-0000-0000-0000-000000000000
                schemaId:
