    put:
      tags:
      - Assets
      summary: Update an asset
      operationId: updateAsset
      description: Update an asset by ID
      parameters:
      - schema:
          type: string
          description: The asset ID
          example: 00000000-0000-0000-0000-000000000000
        required: true
        description: The asset ID
        name: assetId
        in: path
      requestBody:
        description: Body of the request to update an asset
        content:
          application/json:
            schema:
              type: object
              properties:
                tagIds:
                  anyOf:
                  - type: string
                  - type: array
                    items:
                      type: string
                  description: The tag IDs of the asset
                  example:
                  - 00000000-0000-0000-0000-000000000000
                  - 00000000-0000-0000-0000-000000000001
                owners:
                  anyOf:
                  - type: string
                  - type: array
                    items:
                      type: string
                  description: The owners of the asset
                projectIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: The project IDs of the asset
                  example:
                  - 00000000-0000-0000-0000-000000000000
                  - 00000000-0000-0000-0000-000000000001
                framework:
                  type: string
                  enum:
                  - FRONTEND_ANGULAR
                  - FRONTEND_DJANGO
                  - FRONTEND_JAVASCRIPT
                  - FRONTEND_JQUERY
                  - FRONTEND_REACT
                  - FRONTEND_SVELTE
                  - FRONTEND_VUE
                  - GRAPHQL_APOLLO
                  - GRAPHQL_GRAPHQLYOGA
                  - REST_ASP_NET
                  - REST_CLOJURE
                  - REST_DJANGO
                  - REST_EXPRESS_JS
                  - REST_FASTAPI
                  - REST_FLASK
                  - REST_GIN
                  - REST_HONO
                  - REST_LARAVEL
                  - REST_NESTJS
                  - REST_NEXTJS
                  - REST_NUXTJS
                  - REST_RUBY_ON_RAILS
                  - REST_SCALA_PLAY
                  - REST_SPRING_BOOT
                  - REST_SYMFONY
                  - UNKNOWN
                  description: The framework of the asset
                status:
                  type: string
                  enum:
                  - DEPRECATED
                  - FALSE_POSITIVE
                  - MONITORED
                  - OUT_OF_SCOPE
                  - THIRD_PARTY
                  description: The status of the asset
                description:
                  type: string
                  description: The description of the asset
                  example: Updated asset description
                name:
                  type:
                  - string
                  - 'null'
                  description: The custom name of the asset. If not provided, the default name will be used.
                  example: Customer API
              example:
                framework: REST_DJANGO
                status: DEPRECATED
                description: Updated asset description
                name: Customer API
