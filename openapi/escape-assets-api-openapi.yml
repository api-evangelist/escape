  /assets/{assetId}:
    get:
      tags:
      - Assets
      summary: Get an asset
      operationId: getAsset
      description: Get an asset by ID
      parameters:
      - schema:
          type: string
          description: The asset ID
          example: 00000000-0000-0000-0000-000000000000
        required: true
        description: The asset ID
        name: assetId
        in: path
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
