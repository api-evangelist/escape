naftiko: 1.0.0-alpha2
info:
  label: Escape Public API — Users
  description: 'Escape Public API — Users. 4 operations. Lead operation: Get current user context. Self-contained Naftiko
    capability covering one Escape business surface.'
  tags:
  - Escape
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ESCAPE_API_KEY: ESCAPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: escape-users
    baseUri: https://public.escape.tech/v3
    description: Escape Public API — Users business capability. Self-contained, no shared references.
    resources:
    - name: me
      path: /me
      operations:
      - name: getme
        method: GET
        description: Get current user context
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-invite
      path: /users/invite
      operations:
      - name: inviteuser
        method: POST
        description: Invite users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: getuser
        method: GET
        description: Get a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The user ID
          required: true
    authentication:
      type: apikey
      key: X-ESCAPE-API-KEY
      value: '{{env.ESCAPE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: escape-users-rest
    port: 8080
    description: REST adapter for Escape Public API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/me
      name: me
      description: REST surface for me.
      operations:
      - method: GET
        name: getme
        description: Get current user context
        call: escape-users.getme
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: List users
        call: escape-users.listusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/invite
      name: users-invite
      description: REST surface for users-invite.
      operations:
      - method: POST
        name: inviteuser
        description: Invite users
        call: escape-users.inviteuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: getuser
        description: Get a user
        call: escape-users.getuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: escape-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Escape Public API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-current-user-context
      description: Get current user context
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: escape-users.getme
      outputParameters:
      - type: object
        mapping: $.
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: escape-users.listusers
      outputParameters:
      - type: object
        mapping: $.
    - name: invite-users
      description: Invite users
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: escape-users.inviteuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: escape-users.getuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
