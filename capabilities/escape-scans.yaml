        - name: size
          in: query
          type: integer
          description: The number of items to return per page
        - name: sortType
          in: query
          type: string
          description: The type to sort by
        - name: sortDirection
          in: query
          type: string
          description: The direction to sort by
        - name: after
          in: query
          type: string
          description: Filter by after date
        - name: before
          in: query
          type: string
          description: Filter by before date
        - name: assetIds
          in: query
          type: string
          description: Filter by asset IDs
        - name: profileIds
          in: query
          type: string
          description: Filter by profile IDs
        - name: projectIds
          in: query
          type: string
          description: Filter by project IDs
        - name: ignored
          in: query
          type: string
          description: Filter by ignored status
        - name: initiator
          in: query
          type: array
          description: Filter by initiator
        - name: kinds
          in: query
          type: array
          description: Filter by kind
        - name: status
          in: query
          type: array
          description: Filter by status
