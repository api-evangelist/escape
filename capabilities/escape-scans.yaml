      path: /scans
      operations:
      - name: listscans
        method: GET
        description: List scans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: The cursor to start the pagination from. Returned by the previous page response. If not provided, the
            first page will be returned.
        - name: size
          in: query
          type: integer
          description: The number of items to return per page
        - name: sortType
          in: query
          type: string
          description: The type to sort by
        - name: sortDirection
          in: query
          type: string
          description: The direction to sort by
        - name: after
          in: query
          type: string
          description: Filter by after date
        - name: before
          in: query
          type: string
          description: Filter by before date
        - name: assetIds
          in: query
          type: string
          description: Filter by asset IDs
        - name: profileIds
          in: query
          type: string
          description: Filter by profile IDs
        - name: ignored
          in: query
          type: string
          description: Filter by ignored status
        - name: initiator
          in: query
          type: array
          description: Filter by initiator
        - name: kinds
          in: query
          type: array
          description: Filter by kind
        - name: status
          in: query
          type: array
          description: Filter by status
        - name: projectIds
          in: query
          type: string
          description: Filter by project IDs
      - name: startscan
        method: POST
        description: Start a new scan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: scans-problems
      path: /scans/problems
      operations:
      - name: scansproblems
        method: GET
        description: List scans with their problems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: The cursor to start the pagination from. Returned by the previous page response. If not provided, the
