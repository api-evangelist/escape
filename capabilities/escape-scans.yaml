    - name: scans-scanId-ignore
      path: /scans/{scanId}/ignore
      operations:
      - name: ignorescan
        method: PUT
        description: Ignore a scan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: scanId
          in: path
          type: string
