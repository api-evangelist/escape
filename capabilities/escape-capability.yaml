          in: query
          type: string
          description: The cursor to start the pagination from. Returned by the previous page response. If not provided, the
            first page will be returned.
        - name: size
          in: query
          type: integer
          description: The number of items to return per page
        - name: sortType
          in: query
          type: string
          description: The type to sort by
        - name: sortDirection
          in: query
          type: string
          description: The direction to sort by
        - name: assetIds
          in: query
          type: string
          description: Filter by asset IDs
        - name: domains
          in: query
          type: string
          description: Filter by domain
        - name: issueIds
          in: query
          type: string
          description: Filter by issue IDs
        - name: tagIds
          in: query
          type: string
          description: Filter by tag IDs
        - name: search
          in: query
          type: string
          description: Search term to filter profiles by name or description
        - name: initiators
          in: query
          type: array
          description: Filter by initiator
        - name: kinds
          in: query
          type: array
          description: Filter by kind
        - name: risks
          in: query
          type: array
          description: Filter by risk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
