naftiko: 1.0.0-alpha2
info:
  label: Escape Public API — Jobs
  description: 'Escape Public API — Jobs. 2 operations. Lead operation: Trigger a template export job. Self-contained Naftiko
    capability covering one Escape business surface.'
  tags:
  - Escape
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ESCAPE_API_KEY: ESCAPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: escape-jobs
    baseUri: https://public.escape.tech/v3
    description: Escape Public API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: triggerexport
        method: POST
        description: Trigger a template export job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: jobs-jobId
      path: /jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Get a job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          description: The job ID
          required: true
    authentication:
      type: apikey
      key: X-ESCAPE-API-KEY
      value: '{{env.ESCAPE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: escape-jobs-rest
    port: 8080
    description: REST adapter for Escape Public API — Jobs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: POST
        name: triggerexport
        description: Trigger a template export job
        call: escape-jobs.triggerexport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Get a job
        call: escape-jobs.getjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: escape-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Escape Public API — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: trigger-template-export-job
      description: Trigger a template export job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: escape-jobs.triggerexport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: Get a job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: escape-jobs.getjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
